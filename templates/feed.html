
{% extends "base.html" %}
{% block title %}الرئيسية{% endblock %}
{% block content %}
<div class="glass-card post-form-card">
    <h3>شارك شيئاً جديداً</h3>
    <form method="POST" action="{{ url_for('add_post') }}" class="glass-form">
        <div class="form-group">
            <textarea name="content" rows="3" placeholder="ماذا يدور في ذهنك؟" required class="glass-input"></textarea>
        </div>
        <button type="submit" class="glass-btn">نشر</button>
    </form>
</div>

<div class="posts-container">
    {% for post in posts %}
        <div class="glass-card post-card">
            <div class="post-header">
                <strong>{{ post.username }}</strong>
                <small>{{ post.created_at }}</small>
            </div>
            <div class="post-content">
                <p>{{ post.content }}</p>
            </div>
        </div>
    {% else %}
        <div class="glass-card empty-posts">
            <p>لا توجد منشورات بعد. كن أول من يشارك!</p>
        </div>
    {% endfor %}
</div>
{% endblock %}
