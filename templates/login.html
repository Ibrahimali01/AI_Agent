
{% extends "base.html" %}
{% block title %}تسجيل الدخول{% endblock %}
{% block content %}
<div class="glass-card auth-card">
    <h2>تسجيل الدخول</h2>
    <form method="POST" class="glass-form">
        <div class="form-group">
            <label for="username">اسم المستخدم</label>
            <input type="text" id="username" name="username" required class="glass-input">
        </div>
        <div class="form-group">
            <label for="password">كلمة المرور</label>
            <input type="password" id="password" name="password" required class="glass-input">
        </div>
        <button type="submit" class="glass-btn big">دخول</button>
    </form>
    <p class="auth-link">ليس لديك حساب؟ <a href="{{ url_for('register') }}">إنشاء حساب</a></p>
</div>
{% endblock %}
